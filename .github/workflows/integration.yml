name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        poetry-version: ["2.1.0"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: protea
          POSTGRES_PASSWORD: protea
          POSTGRES_DB: protea_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: abatilo/actions-poetry@v3
        with:
          poetry-version: ${{ matrix.poetry-version }}

      - name: Add poetry to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install psql client
        run: sudo apt-get install -y postgresql-client

      - name: Enable pgvector extension
        run: PGPASSWORD=protea psql -h localhost -U protea -d protea_test -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run integration tests
        env:
          PROTEA_PG_USER: protea
          PROTEA_PG_PASSWORD: protea
          PROTEA_PG_DB: protea_test
          PROTEA_PG_PORT: 5432
        run: poetry run pytest --with-postgres -q
